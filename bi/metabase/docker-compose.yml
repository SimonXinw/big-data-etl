# Metabase 自身配置（管理员账号、已连接的数据库、仪表盘与 Question）默认落在容器内。
# 若不加卷，执行 docker compose down 并删容器后可能丢失；下方命名卷用于持久化。
# 生产级可考虑将 Metabase 应用库改为 PostgreSQL（见官方文档 MB_DB_*）。
services:
  metabase:
    image: metabase/metabase:latest
    container_name: etl-metabase
    ports:
      - "3000:3000"
    environment:
      MB_JETTY_PORT: 3000
      # 与下方卷一致，否则 Metabase 仍把应用库写在容器内默认路径，删容器会丢仪表盘/数据源配置
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data

volumes:
  metabase_data:
